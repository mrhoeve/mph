<div class="modal-overlay" tabindex="-1" (click)="$event.target === $event.currentTarget ? dismissed.emit() : undefined" (document:keydown.escape)="dismissed.emit()">
  <dialog class="modal-content" open aria-modal="true">
    <h3>Override Property</h3>
    <p>Set a local override for <strong>{{ prop().name }}</strong>.</p>

    @if (prop().nexusIqViolations && prop().nexusIqViolations!.length > 0) {
      <div class="security-banner">
        <span class="icon">🛡️</span>
        <p>Nexus IQ suggests upgrading to <strong>{{ prop().nexusIqViolations![0].remediationVersion }}</strong> to fix vulnerabilities.</p>
      </div>
    }
    
    <div class="form-group">
      <label for="newValue">New Version</label>
      <input type="text" id="newValue" [ngModel]="overrideNewValue()" (ngModelChange)="overrideNewValue.set($event)" placeholder="e.g. 3.4.0">
    </div>

    <div class="form-group">
      <label for="remark">Remark (optional comment)</label>
      <input type="text" id="remark" [ngModel]="overrideRemark()" (ngModelChange)="overrideRemark.set($event)" placeholder="e.g. overridden due to CVE">
    </div>
    
    <div class="modal-actions">
      <button class="secondary-button" (click)="dismissed.emit()">Cancel</button>
      <button class="primary-button" [disabled]="!overrideNewValue()" (click)="onExecute()">Apply Override</button>
    </div>
  </dialog>
</div>
