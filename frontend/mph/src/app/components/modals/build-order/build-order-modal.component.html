<div class="modal-overlay" tabindex="-1" (click)="$event.target === $event.currentTarget && dismissed.emit()" (keydown.escape)="dismissed.emit()">
  <div class="modal-content wide" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3>Project Build Order</h3>
      <button class="close-icon" aria-label="Close" (click)="dismissed.emit()">×</button>
    </div>

    <div class="build-order-container">
      <div class="build-order-main">
        @if (isLoading()) {
          <div class="loading-container">
            <div class="spinner"></div>
            <p>Calculating build order...</p>
          </div>
        } @else if (errorMessage(); as error) {
          <div class="error-banner">
            <span class="error-icon">⚠️</span>
            <span>{{ error }}</span>
          </div>
        } @else {
          <div class="actions" style="margin-bottom: 16px;">
            <button class="primary-button" (click)="downloadExcel()">Export to Excel</button>
          </div>
          <div class="build-order-table-wrapper">
            <table class="managed-properties-table">
              <thead>
                <tr>
                  <th>Order</th>
                  <th>Project</th>
                  <th>Version</th>
                </tr>
              </thead>
              <tbody>
                @for (p of buildOrderProjects(); track p.path; let i = $index) {
                  <tr>
                    <td>{{ i + 1 }}</td>
                    <td>{{ p.artifactId }}</td>
                    <td>{{ p.version }}</td>
                  </tr>
                }
              </tbody>
            </table>
          </div>
        }
      </div>
      <div class="dependency-graph-section">
        <div class="graph-header">
          <div class="header-main">
            <h4>Dependency Graph</h4>
            <div class="focus-selector">
              <label for="project-focus">Focus:</label>
              <select id="project-focus" [value]="selectedProjectPath()" (change)="onProjectFocusChange($event)">
                <option value="all">Full Graph</option>
                @for (item of hierarchicalProjects(); track item.project.path) {
                  <option [value]="item.project.path" [style.font-weight]="item.isParent ? 'bold' : 'normal'">
                    {{ getProjectDisplayName(item) }}
                  </option>
                }
              </select>
            </div>
          </div>
          <div class="graph-actions">
            <button class="icon-button" (click)="zoomIn()" title="Zoom In">+</button>
            <button class="icon-button" (click)="zoomOut()" title="Zoom Out">-</button>
            <button class="icon-button" (click)="resetZoom()" title="Reset Zoom">⟲</button>
            <button class="primary-button small" (click)="saveAsImage()">Save as Image</button>
          </div>
        </div>
        <div id="dependency-graph-container" class="mermaid-graph-container">
          <div id="dependency-graph" class="mermaid-graph"></div>
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="secondary-button" (click)="dismissed.emit()">Close</button>
    </div>
  </div>
</div>
