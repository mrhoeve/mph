name: Build and Publish

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Extract Version
      id: get_version
      run: |
        chmod +x mvnw
        VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
        if [[ $VERSION == *"-SNAPSHOT" ]]; then
          RELEASE_VERSION=${VERSION%-SNAPSHOT}
        else
          RELEASE_VERSION=$VERSION
        fi
        echo "version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
        # Set the version in pom.xml so the built JAR has the right version info
        ./mvnw versions:set -DnewVersion=$RELEASE_VERSION -DgenerateBackupPoms=false

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/mph/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: frontend/mph
      run: npm install

    - name: Build with Maven
      run: |
        # Add local node_modules/.bin to PATH so 'ng' command in pom.xml is found
        export PATH=$PATH:$(pwd)/frontend/mph/node_modules/.bin
        chmod +x mvnw
        ./mvnw clean install -DskipTests

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mph-jar
        path: target/mph.jar

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: mph-jar
        path: .
        merge-multiple: true

    - name: Create Version Tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        VERSION="${{ needs.build.outputs.version }}"
        TAG_NAME="v$VERSION"
        
        if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
          echo "Tag $TAG_NAME already exists. Skipping tag creation."
        else
          # Update pom.xml to release version to make the tag "proper"
          chmod +x mvnw
          ./mvnw versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "Release $VERSION"
          git tag "$TAG_NAME"
          
          # Bump to next snapshot version
          IFS='.' read -ra PARTS <<< "$VERSION"
          LAST_PART_INDEX=$((${#PARTS[@]} - 1))
          if [[ "${PARTS[$LAST_PART_INDEX]}" =~ ^[0-9]+$ ]]; then
            PARTS[$LAST_PART_INDEX]=$((PARTS[$LAST_PART_INDEX] + 1))
          fi
          NEXT_VERSION=$(IFS='.'; echo "${PARTS[*]}")-SNAPSHOT
          
          echo "Bumping to next version: $NEXT_VERSION"
          ./mvnw versions:set -DnewVersion=$NEXT_VERSION -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "Prepare for next development iteration: $NEXT_VERSION"
          
          git push origin main
          git push origin "$TAG_NAME"
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ needs.build.outputs.version }}
        name: Release v${{ needs.build.outputs.version }}
        body: "Automated release of version ${{ needs.build.outputs.version }} from the main branch."
        files: mph.jar
        prerelease: false
        make_latest: "true"
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
