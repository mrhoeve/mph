name: Build and Publish

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/mph/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: frontend/mph
      run: npm install

    - name: Build with Maven
      run: |
        # Add local node_modules/.bin to PATH so 'ng' command in pom.xml is found
        export PATH=$PATH:$(pwd)/frontend/mph/node_modules/.bin
        chmod +x mvnw
        ./mvnw clean install -DskipTests

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mph-jar
        path: target/mph.jar

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: mph-jar
        path: .
        merge-multiple: true

    - name: Update Latest Tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -f latest
        git push origin latest --force

    - name: Create/Update Latest Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Release
        body: "Automated build of the latest version from the main branch."
        files: mph.jar
        prerelease: false
        make_latest: "true"
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete older releases
      uses: dev-drprasad/delete-older-releases@v0.3.4
      with:
        keep_latest: 1
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
