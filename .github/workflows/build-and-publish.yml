name: Build and Publish

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/mph/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: frontend/mph
      run: npm install

    - name: Build with Maven
      run: |
        # Add local node_modules/.bin to PATH so 'ng' command in pom.xml is found
        export PATH=$PATH:$(pwd)/frontend/mph/node_modules/.bin
        chmod +x mvnw
        ./mvnw clean install -DskipTests

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mph-jar
        path: target/mph.jar

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: mph-jar

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: mph.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
