name: Build and SonarQube

on:
  push:
  pull_request:
  workflow_call:
    inputs:
      release_version:
        description: Optional release version used for the packaged artifact
        required: false
        type: string
        default: ''
      release_build:
        description: Build release artifacts instead of development artifacts
        required: false
        type: boolean
        default: false
    secrets:
      SONAR_TOKEN:
        required: true
    outputs:
      version:
        description: Release version derived from the Maven project version
        value: ${{ jobs.build.outputs.version }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  intellij-plugin:
    name: Test and verify IntelliJ plugin
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
        cache-dependency-path: |
          intellij-plugin/*.gradle.kts
          intellij-plugin/gradle.properties
          intellij-plugin/gradle/wrapper/gradle-wrapper.properties

    - name: Test, package, and verify IntelliJ plugin
      working-directory: intellij-plugin
      env:
        REQUESTED_RELEASE_VERSION: ${{ inputs.release_version || '' }}
        RELEASE_BUILD: ${{ inputs.release_build || false }}
      run: |
        chmod +x gradlew
        GRADLE_ARGUMENTS=()
        if [[ -n "$REQUESTED_RELEASE_VERSION" ]]; then
          GRADLE_ARGUMENTS+=("-PmphVersion=$REQUESTED_RELEASE_VERSION")
        elif [[ "$RELEASE_BUILD" == "true" ]]; then
          GRADLE_ARGUMENTS+=("-PreleaseBuild=true")
        fi
        ./gradlew "${GRADLE_ARGUMENTS[@]}" koverXmlReport buildPlugin verifyPlugin --console=plain

    - name: Upload IntelliJ Plugin Package
      uses: actions/upload-artifact@v7
      with:
        name: mph-intellij-plugin
        path: intellij-plugin/build/distributions/*.zip
        if-no-files-found: error

    - name: Upload IntelliJ Plugin Coverage
      uses: actions/upload-artifact@v7
      with:
        name: intellij-plugin-coverage
        path: intellij-plugin/build/reports/kover/report.xml
        if-no-files-found: error
        retention-days: 1

  build:
    name: Build, test, and analyze
    needs: intellij-plugin
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Extract Version
      id: get_version
      env:
        REQUESTED_RELEASE_VERSION: ${{ inputs.release_version || '' }}
        RELEASE_BUILD: ${{ inputs.release_build || false }}
      run: |
        chmod +x mvnw
        VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
        if [[ -n "$REQUESTED_RELEASE_VERSION" ]]; then
          RELEASE_VERSION=$REQUESTED_RELEASE_VERSION
        elif [[ "$RELEASE_BUILD" == "true" && $VERSION == *"-SNAPSHOT" ]]; then
          RELEASE_VERSION=${VERSION%-SNAPSHOT}
        else
          RELEASE_VERSION=$VERSION
        fi
        echo "version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
        # Set the version in pom.xml so the built JAR has the right version info
        ./mvnw versions:set -DnewVersion=$RELEASE_VERSION -DgenerateBackupPoms=false

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/mph/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: frontend/mph
      run: npm ci

    - name: Run Frontend Unit Tests
      working-directory: frontend/mph
      run: npm run test:coverage

    - name: Normalize Frontend Coverage Paths
      run: |
        node -e "const fs=require('fs');const file='frontend/mph/coverage/mph/lcov.info';const lcov=fs.readFileSync(file,'utf8').replace(/^SF:src\//gm,'SF:frontend/mph/src/');fs.writeFileSync(file,lcov);"

    - name: Download IntelliJ Plugin Coverage
      uses: actions/download-artifact@v8
      with:
        name: intellij-plugin-coverage
        path: intellij-plugin/build/reports/kover

    - name: Run Backend Unit Tests
      run: |
        chmod +x mvnw
        ./mvnw -B test -Dexec.skip=true

    - name: Build with Maven
      run: |
        # Add local node_modules/.bin to PATH so 'ng' command in pom.xml is found
        export PATH=$PATH:$(pwd)/frontend/mph/node_modules/.bin
        chmod +x mvnw
        ./mvnw -B package -DskipTests

    - name: Install Playwright Chromium
      working-directory: frontend/mph
      run: npm exec -- playwright install --with-deps chromium

    - name: Run Playwright End-to-End Tests
      working-directory: frontend/mph
      run: npm run test:e2e

    - name: Upload Playwright Failure Artifacts
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: playwright-failure-artifacts
        path: |
          frontend/mph/playwright-report
          frontend/mph/test-results
        if-no-files-found: ignore
        retention-days: 7

    - name: Verify SonarQube Cloud Configuration
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
        SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      run: |
        [[ -n "$SONAR_TOKEN" ]] || { echo "::error::SONAR_TOKEN is not configured"; exit 1; }
        [[ -n "$SONAR_ORGANIZATION" ]] || { echo "::error::SONAR_ORGANIZATION is not configured"; exit 1; }
        [[ -n "$SONAR_PROJECT_KEY" ]] || { echo "::error::SONAR_PROJECT_KEY is not configured"; exit 1; }

    - name: Run SonarQube Cloud Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
        SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      run: |
        ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:5.7.0.6970:sonar \
          -Dexec.skip=true \
          -DskipTests \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.organization="$SONAR_ORGANIZATION" \
          -Dsonar.projectKey="$SONAR_PROJECT_KEY" \
          -Dsonar.qualitygate.wait=true \
          -Dsonar.qualitygate.timeout=300

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v7
      with:
        name: mph-jar
        path: target/mph.jar

  branch-snapshot:
    name: Publish branch snapshot
    if: >-
      ${{ github.event_name == 'push' &&
          github.ref_type == 'branch' &&
          github.ref_name != 'main' }}
    needs:
    - intellij-plugin
    - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: branch-snapshot-${{ github.ref }}
      cancel-in-progress: true

    steps:
    - name: Download verified application artifact
      uses: actions/download-artifact@v8
      with:
        name: mph-jar
        path: snapshot-assets/application

    - name: Download verified IntelliJ plugin artifact
      uses: actions/download-artifact@v8
      with:
        name: mph-intellij-plugin
        path: snapshot-assets/plugin

    - name: Prepare branch snapshot assets
      id: snapshot
      env:
        BRANCH_NAME: ${{ github.ref_name }}
      run: |
        set -euo pipefail

        BRANCH_SLUG=$(printf '%s' "$BRANCH_NAME" |
          tr '[:upper:]' '[:lower:]' |
          sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//')
        if [[ -z "$BRANCH_SLUG" ]]; then
          echo "::error::The branch name could not be converted to a safe snapshot name."
          exit 1
        fi

        mapfile -t PLUGIN_FILES < <(find snapshot-assets/plugin -type f -name '*.zip')
        if [[ ${#PLUGIN_FILES[@]} -ne 1 ]]; then
          echo "::error::Expected exactly one IntelliJ plugin ZIP, found ${#PLUGIN_FILES[@]}."
          exit 1
        fi
        if [[ ! -f snapshot-assets/application/mph.jar ]]; then
          echo "::error::The verified application JAR is missing."
          exit 1
        fi

        SNAPSHOT_TAG="snapshot-$BRANCH_SLUG"
        SNAPSHOT_TITLE="Snapshot: $BRANCH_NAME"
        APPLICATION_ASSET="mph-$BRANCH_SLUG-SNAPSHOT.jar"
        PLUGIN_ASSET="mph-intellij-plugin-$BRANCH_SLUG-SNAPSHOT.zip"

        cp snapshot-assets/application/mph.jar "snapshot-assets/$APPLICATION_ASSET"
        cp "${PLUGIN_FILES[0]}" "snapshot-assets/$PLUGIN_ASSET"

        echo "tag=$SNAPSHOT_TAG" >> "$GITHUB_OUTPUT"
        echo "title=$SNAPSHOT_TITLE" >> "$GITHUB_OUTPUT"
        echo "application_asset=snapshot-assets/$APPLICATION_ASSET" >> "$GITHUB_OUTPUT"
        echo "plugin_asset=snapshot-assets/$PLUGIN_ASSET" >> "$GITHUB_OUTPUT"

    - name: Replace mutable branch snapshot
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
        SNAPSHOT_TAG: ${{ steps.snapshot.outputs.tag }}
        SNAPSHOT_TITLE: ${{ steps.snapshot.outputs.title }}
        APPLICATION_ASSET: ${{ steps.snapshot.outputs.application_asset }}
        PLUGIN_ASSET: ${{ steps.snapshot.outputs.plugin_asset }}
        BRANCH_NAME: ${{ github.ref_name }}
        VERIFIED_SHA: ${{ github.sha }}
      run: |
        set -euo pipefail

        if gh release view "$SNAPSHOT_TAG" >/dev/null 2>&1; then
          gh release delete "$SNAPSHOT_TAG" --cleanup-tag --yes
        elif gh api "repos/$GH_REPO/git/ref/tags/$SNAPSHOT_TAG" >/dev/null 2>&1; then
          gh api --method DELETE "repos/$GH_REPO/git/refs/tags/$SNAPSHOT_TAG"
        fi

        gh release create "$SNAPSHOT_TAG" \
          "$APPLICATION_ASSET" \
          "$PLUGIN_ASSET" \
          --target "$VERIFIED_SHA" \
          --title "$SNAPSHOT_TITLE" \
          --notes "Mutable snapshot of branch '$BRANCH_NAME' at commit $VERIFIED_SHA. It passed the complete build, test, Playwright, plugin-verification, and SonarQube quality-gate workflow." \
          --prerelease \
          --latest=false
